<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Harshad Yele</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="display-4 heading">Get in Touch</h1>
        <p class="lead">
            I'd love to hear from you. Whether you have a project,
            a question, or just want to say hello, feel free to contact me.
        </p>
    </div>

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-4">

                <form>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" class="form-control" placeholder="Subject">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="5" placeholder="Write your message here..."></textarea>
                    </div>

                    <div class="text-center">
                        <button class="btn btn-info btn-lg text-white px-5">
                            Send Message
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
